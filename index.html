<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>牛马职业人测试 · 测测你是哪种工位上的"永动机"</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #4a5568;
      --secondary: #718096;
      --accent: #f6ad55;
      --danger: #fc8181;
      --bg-dark: #1a202c;
      --bg-card: #2d3748;
      --text-light: #e2e8f0;
      --text-muted: #a0aec0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 页面容器 */
    .page {
      display: none;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.5s ease;
    }

    .page.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 首页 */
    .home-page {
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
    }

    .main-title {
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 900;
      background: linear-gradient(135deg, #f6ad55, #fc8181);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 1.2rem;
      color: var(--accent);
      margin-bottom: 24px;
      font-weight: 500;
    }

    .description {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .btn {
      background: linear-gradient(135deg, var(--accent), #ed8936);
      color: var(--bg-dark);
      border: none;
      padding: 16px 48px;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      box-shadow: 0 4px 15px rgba(246, 173, 85, 0.3);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(246, 173, 85, 0.4);
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* 答题页 */
    .quiz-page {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }

    .progress-container {
      width: 100%;
      margin-bottom: 32px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .progress-text {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .progress-status {
      font-size: 0.85rem;
      color: #48bb78;
      font-weight: 500;
    }

    .progress-status.warning {
      color: var(--accent);
    }

    .progress-status.danger {
      color: var(--danger);
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--bg-card);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #48bb78, #68d391);
      border-radius: 4px;
      transition: width 0.5s ease, background 0.5s ease;
    }

    .progress-fill.warning {
      background: linear-gradient(90deg, var(--accent), #f6ad55);
    }

    .progress-fill.danger {
      background: linear-gradient(90deg, var(--danger), #fc8181);
    }

    .battery-icon {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .battery {
      width: 24px;
      height: 12px;
      border: 2px solid var(--text-muted);
      border-radius: 3px;
      position: relative;
      padding: 1px;
    }

    .battery::after {
      content: '';
      position: absolute;
      right: -5px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 0 2px 2px 0;
    }

    .battery-level {
      height: 100%;
      background: #48bb78;
      border-radius: 1px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .battery-level.warning {
      background: var(--accent);
    }

    .battery-level.danger {
      background: var(--danger);
    }

    .question-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 32px 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .question-number {
      font-size: 0.85rem;
      color: var(--accent);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .question-text {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1rem;
      color: var(--text-light);
      text-align: left;
      font-family: inherit;
    }

    .option:hover {
      background: rgba(246, 173, 85, 0.1);
      border-color: var(--accent);
      transform: translateX(8px);
    }

    .option:active {
      transform: scale(0.98);
    }

    /* 加载页 */
    .loading-page {
      text-align: center;
    }

    .loading-text {
      font-size: 1.3rem;
      color: var(--text-light);
      margin-bottom: 32px;
      min-height: 40px;
    }

    .loading-spinner {
      width: 80px;
      height: 80px;
      border: 4px solid var(--bg-card);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 32px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    .loading-progress {
      width: 200px;
      height: 6px;
      background: var(--bg-card);
      border-radius: 3px;
      margin: 0 auto;
      overflow: hidden;
    }

    .loading-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      animation: loadingProgress 3s ease-in-out forwards;
    }

    @keyframes loadingProgress {
      0% { width: 0%; }
      50% { width: 60%; }
      100% { width: 100%; }
    }

    /* 结果页 */
    .result-page {
      max-width: 550px;
      width: 100%;
      text-align: center;
    }

    .result-card {
      background: var(--bg-card);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .result-label {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .result-title {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--danger));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }

    .result-subtitle {
      font-size: 1.1rem;
      color: var(--text-light);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .result-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .result-tag {
      background: rgba(246, 173, 85, 0.15);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .result-features {
      text-align: left;
      margin-bottom: 32px;
    }

    .result-feature {
      background: rgba(255, 255, 255, 0.03);
      border-left: 3px solid var(--accent);
      padding: 14px 18px;
      margin-bottom: 12px;
      border-radius: 0 8px 8px 0;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .result-match {
      background: rgba(72, 187, 120, 0.1);
      border-left: 3px solid #48bb78;
    }

    .result-avoid {
      background: rgba(252, 129, 129, 0.1);
      border-left: 3px solid var(--danger);
    }

    .result-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-btn {
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .result-btn:hover {
      background: var(--accent);
      color: var(--bg-dark);
    }

    .result-btn.primary {
      background: var(--accent);
      color: var(--bg-dark);
    }

    .result-btn.primary:hover {
      background: #ed8936;
    }

    /* 彩蛋 */
    .egg-title {
      background: linear-gradient(135deg, #fc8181, #f6ad55, #68d391) !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
    }

    /* 分享提示 */
    .share-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-card);
      color: var(--text-light);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
      border: 1px solid var(--accent);
    }

    .share-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .page {
        padding: 16px;
      }

      .question-card {
        padding: 24px 18px;
      }

      .result-card {
        padding: 28px 20px;
      }

      .btn {
        padding: 14px 36px;
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

  <!-- 首页 -->
  <div id="homePage" class="page home-page active">
    <h1 class="main-title">牛马职业人测试</h1>
    <p class="subtitle">测测你是哪种工位上的"永动机"</p>
    <p class="description">
      一共10道题，没有对错，只是让你看看自己在打工人里属于哪一类。<br>
      别当真，仅供娱乐，测完该摸鱼摸鱼，该加班加班。
    </p>
    <button class="btn" onclick="startQuiz()">🚀 开始测一测</button>
  </div>

  <!-- 答题页 -->
  <div id="quizPage" class="page quiz-page">
    <div class="progress-container">
      <div class="battery-icon">
        <div class="battery">
          <div class="battery-level" id="batteryLevel"></div>
        </div>
        <span class="progress-text" id="progressText">第 1 题 / 共 10 题</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="progress-status" id="progressStatus">电量满格，你还能撑</p>
    </div>

    <div class="question-card">
      <p class="question-number" id="questionNumber">第 1 题</p>
      <p class="question-text" id="questionText"></p>
      <div class="options" id="optionsContainer"></div>
    </div>
  </div>

  <!-- 加载页 -->
  <div id="loadingPage" class="page loading-page">
    <p class="loading-text" id="loadingText">正在读取你的工位记忆<span class="loading-dots"></span></p>
    <div class="loading-spinner"></div>
    <div class="loading-progress">
      <div class="loading-progress-fill"></div>
    </div>
  </div>

  <!-- 结果页 -->
  <div id="resultPage" class="page result-page">
    <div class="result-card">
      <p class="result-label">你是</p>
      <h2 class="result-title" id="resultTitle"></h2>
      <p class="result-subtitle" id="resultSubtitle"></p>

      <div class="result-tags" id="resultTags"></div>

      <div class="result-features" id="resultFeatures"></div>

      <div class="result-buttons">
        <button class="result-btn primary" onclick="restartQuiz()">🔄 再测一次</button>
        <button class="result-btn" onclick="shareResult()">📤 分享给同事</button>
      </div>
    </div>
  </div>

  <div class="share-toast" id="shareToast">链接已复制，快去分享吧！</div>

  <script>
    // 题目数据
    var questions = [
      {

        ]

        tags: ["时间刺客", "带薪如厕冠军", "咖啡品鉴师", "茶水间常驻"],
        features: [
          "你精通各种摸鱼技巧，且摸出了境界",
          "带薪如厕是你的日常，午休时间绝不浪费",
          "电脑屏幕是摆设，手机才是本体",
          "你对公司的最大贡献：维持工位有人这件事"
        ],
        match: "最适配的工位搭子：老实人（给你打掩护）",
        avoid: "最怕遇到的领导：微管理大师"
      }
    };

    // 加载页文案
    var loadingTexts = [
      "正在读取你的工位记忆",
      "分析你的摸鱼时长&加班记录",
      "匹配你的牛马职业人格",
      "生成你的专属分析报告"
    ];

    // 游戏状态
    var currentQuestion = 0;
    var answers = [];

    // 开始测试
    function startQuiz() {
      currentQuestion = 0;
      answers = [];
      showPage('quizPage');
      renderQuestion();
    }

    // 显示页面
    function showPage(pageId) {
      var pages = document.querySelectorAll('.page');
      for (var i = 0; i < pages.length; i++) {
        pages[i].classList.remove('active');
      }
      document.getElementById(pageId).classList.add('active');
    }

    // 渲染题目
    function renderQuestion() {
      var q = questions[currentQuestion];
      var progress = (currentQuestion + 1) / questions.length;

      // 更新进度
      document.getElementById('progressText').textContent = '第 ' + (currentQuestion + 1) + ' 题 / 共 ' + questions.length + ' 题';
      document.getElementById('progressFill').style.width = (progress * 100) + '%';
      document.getElementById('batteryLevel').style.width = ((1 - progress) * 100) + '%';

      // 更新状态文案
      var statusEl = document.getElementById('progressStatus');
      var progressFill = document.getElementById('progressFill');
      var batteryLevel = document.getElementById('batteryLevel');

      if (progress <= 0.3) {
        statusEl.textContent = "电量满格，你还能撑";
        statusEl.className = "progress-status";
        progressFill.className = "progress-fill";
        batteryLevel.className = "battery-level";
      } else if (progress <= 0.6) {
        statusEl.textContent = "电量掉一半，开始犯困";
        statusEl.className = "progress-status warning";
        progressFill.className = "progress-fill warning";
        batteryLevel.className = "battery-level warning";
      } else if (progress <= 0.9) {
        statusEl.textContent = "红电预警，灵魂出窍";
        statusEl.className = "progress-status danger";
        progressFill.className = "progress-fill danger";
        batteryLevel.className = "battery-level danger";
      } else {
        statusEl.textContent = "电量见底，就差倒下了";
        statusEl.className = "progress-status danger";
        progressFill.className = "progress-fill danger";
        batteryLevel.className = "battery-level danger";
      }

      document.getElementById('questionNumber').textContent = '第 ' + (currentQuestion + 1) + ' 题';
      document.getElementById('questionText').textContent = q.question;

      var optionsContainer = document.getElementById('optionsContainer');
      optionsContainer.innerHTML = '';

      for (var i = 0; i < q.options.length; i++) {
        var option = q.options[i];
        var btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = option.text;
        btn.onclick = (function(tag) {
          return function() { selectOption(tag, this); };
        })(option.tag);
        optionsContainer.appendChild(btn);
      }
    }

    // 选择选项
    function selectOption(tag, btn) {
      // 添加选中效果
      var options = document.querySelectorAll('.option');
      for (var i = 0; i < options.length; i++) {
        options[i].classList.remove('selected');
      }
      btn.classList.add('selected');

      // 记录答案
      answers.push(tag);

      // 跳转到下一题
      setTimeout(function() {
        currentQuestion++;
        if (currentQuestion < questions.length) {
          renderQuestion();
        } else {
          showLoading();
        }
      }, 300);
    }

    // 显示加载页
    function showLoading() {
      showPage('loadingPage');

      var textIndex = 0;
      var loadingTextEl = document.getElementById('loadingText');

      var textInterval = setInterval(function() {
        textIndex = (textIndex + 1) % loadingTexts.length;
        loadingTextEl.innerHTML = loadingTexts[textIndex] + '<span class="loading-dots"></span>';
      }, 800);

      setTimeout(function() {
        clearInterval(textInterval);
        showResult();
      }, 3500);
    }

    // 计算结果
    function calculateResult() {
      var count = {};
      for (var i = 0; i < answers.length; i++) {
        var tag = answers[i];
        count[tag] = (count[tag] || 0) + 1;
      }

      // 找出最多的标签
      var maxTag = 'niuma';
      var maxCount = 0;

      for (var tag in count) {
        if (count[tag] > maxCount) {
          maxCount = count[tag];
          maxTag = tag;
        }
      }

      // 彩蛋：如果摆烂选项太多
      if (count.bailan >= 6) {
        return { type: 'bailan', isEgg: true };
      }

      return { type: maxTag, isEgg: false };
    }

    // 显示结果页
    function showResult() {
      var resultData = calculateResult();
      var result = resultTypes[resultData.type];

      showPage('resultPage');

      var titleEl = document.getElementById('resultTitle');
      titleEl.textContent = '你是【' + result.title + '】';
      if (resultData.isEgg) {
        titleEl.classList.add('egg-title');
      } else {
        titleEl.classList.remove('egg-title');
      }

      document.getElementById('resultSubtitle').textContent = result.subtitle;

      // 渲染标签
      var tagsContainer = document.getElementById('resultTags');
      tagsContainer.innerHTML = '';
      for (var i = 0; i < result.tags.length; i++) {
        var tag = result.tags[i];
        var span = document.createElement('span');
        span.className = 'result-tag';
        span.textContent = tag;
        tagsContainer.appendChild(span);
      }

      // 渲染特点
      var featuresContainer = document.getElementById('resultFeatures');
      featuresContainer.innerHTML = '';
      for (var j = 0; j < result.features.length; j++) {
        var div = document.createElement('div');
        div.className = 'result-feature';
        div.textContent = result.features[j];
        featuresContainer.appendChild(div);
      }

      // 添加匹配和回避
      var matchDiv = document.createElement('div');
      matchDiv.className = 'result-feature result-match';
      matchDiv.textContent = result.match;
      featuresContainer.appendChild(matchDiv);

      var avoidDiv = document.createElement('div');
      avoidDiv.className = 'result-feature result-avoid';
      avoidDiv.textContent = result.avoid;
      featuresContainer.appendChild(avoidDiv);
    }

    // 重新测试
    function restartQuiz() {
      startQuiz();
    }

    // 分享结果
    function shareResult() {
      var resultTitle = document.getElementById('resultTitle').textContent;
      var shareText = '我在「牛马职业人测试」测出了：' + resultTitle + '，你也来试试？';

      if (navigator.clipboard) {
        navigator.clipboard.writeText(shareText + ' ' + window.location.href);
      }

      var toast = document.getElementById('shareToast');
      toast.classList.add('show');
      setTimeout(function() {
        toast.classList.remove('show');
      }, 2000);
    }
  </script>
</body>
</html>
